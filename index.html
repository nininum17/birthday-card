<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday! 🎂</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        html { scroll-behavior: smooth; } /* ทำให้การเลื่อนหน้าจอนุ่มนวล */
        body { font-family: 'Prompt', sans-serif; margin: 0; padding: 0; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .full-screen { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .profile-frame { border: 10px solid white; box-shadow: 0 15px 35px rgba(0,0,0,0.15); transition: transform 0.3s; }
        .profile-frame:hover { transform: scale(1.02) rotate(0deg); }
    </style>
</head>
<body class="bg-gradient-to-br from-indigo-50 via-white to-pink-50">

    <section id="cover" class="full-screen p-6 text-center">
        <div class="glass p-8 rounded-[3rem] shadow-2xl max-w-sm w-full border border-white">
            <h1 class="text-3xl font-bold text-gray-800 mb-6">Happy Birthday! 🎁</h1>
            
            <div class="w-full aspect-square rounded-2xl mb-8 overflow-hidden shadow-lg">
                <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJndm80Z3R4bmZ4bmZ4bmZ4bmZ4bmZ4bmZ4bmZ4bmZ4bmZ4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/ICOgUN7SjnSUo/giphy.gif" 
                     class="w-full h-full object-cover" alt="GIF 1">
            </div>
            
            <button onclick="scrollToWishes()" 
                class="bg-black text-white font-medium py-4 px-12 rounded-full shadow-xl hover:bg-gray-800 transition-all active:scale-90">
                เลื่อนลงไปดูสิ ✨
            </button>
        </div>
    </section>

    <section id="wishes" class="full-screen p-6 text-center bg-white/30">
        <div class="max-w-md w-full py-10">
            
            <div class="w-24 h-24 mx-auto mb-6">
                <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJndm80Z3R4bmZ4bmZ4bmZ4bmZ4bmZ4bmZ4bmZ4bmZ4bmZ4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/oXpZ1s9Uu3W/giphy.gif" 
                     class="w-full h-full object-contain">
            </div>

            <h2 class="text-4xl font-bold text-gray-800 mb-10">Wishing You All the Best</h2>

            <div class="relative w-64 h-64 mx-auto mb-10">
                <img src="https://via.placeholder.com/500x500?text=Birthday+Photo" 
                     id="birthdayPhoto"
                     class="profile-frame rounded-3xl w-full h-full object-cover rotate-3">
                <div class="absolute -top-6 -right-6 text-5xl">🎂</div>
                <div class="absolute -bottom-6 -left-6 text-5xl">🎈</div>
            </div>
            
            <div class="glass p-8 rounded-3xl text-gray-700 text-lg leading-relaxed shadow-lg">
                <p class="mb-4">ขอให้มีความสุขมากๆ สุขภาพแข็งแรง</p>
                <p>ขอให้ทุกความปรารถนาของคุณกลายเป็นจริงในเร็ววัน</p>
                <div class="mt-8 pt-4 border-t border-gray-100">
                    <p class="font-semibold text-gray-800">จาก... [ชื่อของคุณ]</p>
                </div>
            </div>

            <button onclick="window.scrollTo(0,0)" class="mt-10 text-gray-400 hover:text-black transition-colors">
                ↑ กลับไปหน้าแรก
            </button>
        </div>
    </section>

    <audio id="bgMusic" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <script>
        function scrollToWishes() {
            // 1. เลื่อนลงไปที่ส่วนคำอวยพร
            document.getElementById('wishes').scrollIntoView({ behavior: 'smooth' });

            // 2. เล่นเพลง
            const music = document.getElementById('bgMusic');
            music.play().catch(e => console.log("Music play blocked"));

            // 3. จุดพลุแบบกระจาย
            confetti({
                particleCount: 150,
                spread: 100,
                origin: { y: 0.8 }
            });
        }
    </script>
</body>
</html>
