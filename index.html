<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday! 🎂</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        body { font-family: 'Prompt', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .hidden-section { display: none; }
        .fade-in { animation: fadeIn 1.5s ease-in forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gradient-to-br from-yellow-100 via-pink-100 to-purple-200 min-h-screen">

    <div id="page1" class="flex flex-col items-center justify-center min-h-screen p-6 text-center">
        <div class="glass p-8 rounded-3xl shadow-2xl max-w-sm w-full transition-all hover:scale-105">
            <h1 class="text-4xl font-bold text-pink-600 mb-6">You have a message! 💌</h1>
            <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJndm80Z3R4bmZ4bmZ4bmZ4bmZ4bmZ4bmZ4bmZ4bmZ4bmZ4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/ICOgUN7SjnSUo/giphy.gif" 
                 class="w-full rounded-xl mb-6 shadow-md" alt="Cute Cat GIF">
            
            <button onclick="startCelebration()" 
                class="bg-pink-500 hover:bg-pink-600 text-white font-bold py-3 px-10 rounded-full text-lg shadow-lg transition-all active:scale-95">
                เปิดดูเลย ✨
            </button>
        </div>
    </div>

    <div id="page2" class="hidden-section flex flex-col items-center py-12 px-6">
        <div class="max-w-2xl w-full space-y-8">
            
            <div class="glass p-10 rounded-[3rem] shadow-2xl text-center fade-in">
                <h2 class="text-3xl font-bold text-gray-800 mb-4">Happy Birthday!</h2>
                
                <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJndm80Z3R4bmZ4bmZ4bmZ4bmZ4bmZ4bmZ4bmZ4bmZ4bmZ4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1n/oXpZ1s9Uu3W/giphy.gif" 
                     class="w-64 h-64 mx-auto rounded-full object-cover mb-6 border-8 border-white shadow-xl" alt="Celebration GIF">
                
                <div class="text-gray-700 text-lg space-y-4">
                    <p>ขอให้เป็นปีที่มีแต่ความสุข สุขภาพแข็งแรง</p>
                    <p>มีรอยยิ้มที่สดใสในทุกๆ วันเลยนะ!</p>
                </div>
                <div class="mt-8 pt-6 border-t border-pink-200">
                    <p class="font-semibold text-pink-600">จาก... เพื่อนของคุณ 🎂</p>
                </div>
            </div>

            <audio id="bgMusic" loop>
                <source src="https://www.bensound.com/bensound-music/bensound-happybirthday.mp3" type="audio/mpeg">
                เบราว์เซอร์ของคุณไม่รองรับการเล่นเพลง
            </audio>

        </div>
    </div>

    <script>
        function startCelebration() {
            // 1. ซ่อนหน้าแรก แสดงหน้าสอง
            document.getElementById('page1').classList.add('hidden-section');
            document.getElementById('page2').classList.remove('hidden-section');
            document.getElementById('page2').classList.add('fade-in');

            // 2. เล่นเพลง
            const music = document.getElementById('bgMusic');
            music.play().catch(error => console.log("Autoplay blocked:", error));

            // 3. จุดพลุแบบต่อเนื่อง
            const end = Date.now() + (5 * 1000);
            const colors = ['#ff69b4', '#ff1493', '#ffd700'];

            (function frame() {
                confetti({
                    particleCount: 3,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 },
                    colors: colors
                });
                confetti({
                    particleCount: 3,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 },
                    colors: colors
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());
        }
    </script>
</body>
</html>
